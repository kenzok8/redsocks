name: monthly-maintenance

on:
  workflow_dispatch:
  schedule:
    - cron: '05 4 1 * *'

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crypto: [openssl, mbedtls]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libssl-dev libmbedtls-dev

      - name: Build
        run: |
          if [ "${{ matrix.crypto }}" = "mbedtls" ]; then
            make USE_CRYPTO_MBEDTLS=true
          else
            make
          fi

      - name: Audit repository structure
        run: |
          set -euo pipefail
          ! find . -type d \( -name .idea -o -name .vs \) | grep .
          ! find . -type f \( -name '*.o' -o -name '*.obj' -o -name '*.exe' \) | grep .
          test -f README
          test -f README.md
